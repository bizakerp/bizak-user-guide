site_name: Bizak User Guide
site_description: Comprehensive product documentation for Bizak users
site_url: https://bizakerp.github.io/bizak-user-guide/
repo_url: https://github.com/bizakerp/bizak-user-guide
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Welcome: getting-started/index.md
      - First Login: getting-started/first-login.md
      - Navigation Overview: getting-started/navigation.md
      - Roles and Access: getting-started/roles-and-access.md
  - Core Setup:
      - Setup Overview: setup/index.md
      - Company Setup: setup/company.md
      - Account Setup: setup/account-setup.md
      - General Preferences: setup/general-preferences.md
      - Import and Export: setup/import-export.md
  - Modules:
      - Module Overview: modules/index.md
      - Master Data: modules/master-data.md
      - Transactions: modules/transactions.md
      - Sales: modules/sales.md
      - Procurement: modules/procurement.md
      - Inventory: modules/inventory.md
      - Finance: modules/finance.md
      - Payment: modules/payment.md
      - Bank: modules/bank.md
      - POS: modules/pos.md
      - CRM: modules/crm.md
      - Field Operations: modules/sfm.md
      - Notifications: modules/notifications.md
      - Survey: modules/survey.md
  - Reporting:
      - Reports Overview: reports/index.md
      - Account Reports: reports/account-reports.md
      - Sales Reports: reports/sales-reports.md
      - Inventory Reports: reports/inventory-reports.md
      - Procurement Reports: reports/procurement-reports.md
      - Other Reports: reports/other-reports.md
  - Admin:
      - Administration Overview: admin/index.md
      - Users and Roles: admin/users-and-roles.md
      - Workflow and Audit: admin/workflow-audit.md
      - File Cabinet: admin/file-cabinet.md
      - Customization: admin/customization.md
  - Help:
      - Glossary: help/glossary.md
      - FAQs: help/faqs.md
      - Troubleshooting: help/troubleshooting.md
      - Release Notes: help/release-notes.md
