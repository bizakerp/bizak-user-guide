site_name: Bizak User Guide
site_description: Comprehensive product documentation for Bizak users
site_url: https://bizakerp.github.io/bizak-user-guide/
repo_url: https://github.com/bizakerp/bizak-user-guide
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Welcome: getting-started/index.md
      - First Login: getting-started/first-login.md
      - Navigation Overview: getting-started/navigation.md
